<style>
/* ============================================================
   ATHANOR — Design System
   Palette: nero antracite, blu notte, oro tenue, bianco caldo, grigio pietra
   ============================================================ */
:root{
  --antracite:#15181d;
  --antracite-2:#1c2027;
  --notte:#10182b;
  --notte-2:#0b1120;
  --oro:#c9a35b;
  --oro-soft:#d9bd84;
  --oro-deep:#a4823f;
  --bianco:#f4efe6;
  --bianco-dim:#cfc8ba;
  --pietra:#7c8088;
  --pietra-dim:#4a4f57;
  --line:rgba(201,163,91,.16);
  --line-soft:rgba(244,239,230,.07);
  --glass:rgba(255,255,255,.035);
  --glass-2:rgba(255,255,255,.055);
  --shadow:0 18px 50px rgba(0,0,0,.45);
  --r:22px;
  --r-sm:16px;
  --ease:cubic-bezier(.22,.61,.36,1);
  --serif:"Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:var(--sans);
  background:#05070c;
  color:var(--bianco);
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
  overflow:hidden;
  letter-spacing:.2px;
}
/* phone frame */
#device{
  position:relative;
  width:430px;height:920px;max-width:100vw;max-height:100vh;
  background:
    radial-gradient(120% 80% at 50% -10%, #1a2235 0%, transparent 55%),
    linear-gradient(180deg,var(--antracite) 0%, var(--notte-2) 100%);
  border-radius:46px;
  overflow:hidden;
  box-shadow:var(--shadow), inset 0 0 0 1px rgba(255,255,255,.05);
}
@media(max-width:480px){#device{width:100vw;height:100vh;height:100dvh;border-radius:0}}
@media(min-width:768px) and (max-height:940px){#device{height:96vh}}

/* faint geometric backdrop */
#device::before{
  content:"";position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 50% 22%, rgba(201,163,91,.06), transparent 38%),
    radial-gradient(circle at 85% 90%, rgba(40,70,130,.18), transparent 45%);
}
.alch-bg{
  position:absolute;top:-60px;left:50%;transform:translateX(-50%);
  width:520px;height:520px;opacity:.05;z-index:0;pointer-events:none;
  animation:spin 120s linear infinite;
}
@keyframes spin{to{transform:translateX(-50%) rotate(360deg)}}

/* status bar */
.statusbar{
  position:relative;z-index:5;height:46px;display:flex;align-items:center;justify-content:center;
  padding:0 28px;font-size:13px;font-weight:600;color:var(--bianco-dim);
}

/* screens */
#viewport{position:relative;z-index:2;height:calc(100% - 46px - 76px - env(safe-area-inset-bottom,0px));overflow:hidden}
.screen{
  position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;
  padding:6px 22px 40px;
  opacity:0;transform:translateY(14px);pointer-events:none;
  transition:opacity .5s var(--ease), transform .5s var(--ease);
  scrollbar-width:none;
}
.screen::-webkit-scrollbar{display:none}
.screen.active{opacity:1;transform:none;pointer-events:auto}
.screen.no-pad{padding:0}

/* typography */
.eyebrow{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--oro);font-weight:600}
h1.title{font-family:var(--serif);font-weight:500;font-size:31px;line-height:1.12;margin:8px 0 4px}
h2.section{font-family:var(--serif);font-weight:500;font-size:21px;margin:0 0 14px}
.muted{color:var(--pietra);font-size:14px;line-height:1.55}
.lede{color:var(--bianco-dim);font-size:15px;line-height:1.6}

/* cards */
.card{
  background:var(--glass);
  border:1px solid var(--line-soft);
  border-radius:var(--r);
  padding:20px;
  backdrop-filter:blur(8px);
  position:relative;overflow:hidden;
}
.card.gold{border-color:var(--line);
  background:linear-gradient(155deg, rgba(201,163,91,.10), rgba(255,255,255,.02));}
.card+.card{margin-top:14px}

/* buttons */
.btn{
  display:flex;align-items:center;justify-content:center;gap:8px;
  width:100%;padding:16px;border:none;border-radius:16px;cursor:pointer;
  font-family:var(--sans);font-size:15.5px;font-weight:600;letter-spacing:.3px;
  background:linear-gradient(120deg,var(--oro),var(--oro-deep));
  color:#1a1407;
  transition:transform .25s var(--ease), box-shadow .25s var(--ease), filter .25s;
  box-shadow:0 10px 26px rgba(201,163,91,.22);
}
.btn:active{transform:scale(.975)}
.btn.ghost{background:var(--glass-2);color:var(--bianco);box-shadow:none;border:1px solid var(--line)}
.btn.ghost:hover{background:rgba(255,255,255,.08)}
.btn:disabled{filter:grayscale(.6) brightness(.7);box-shadow:none;cursor:default}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{
  padding:11px 16px;border-radius:40px;border:1px solid var(--line-soft);
  background:var(--glass);font-size:14px;color:var(--bianco-dim);cursor:pointer;
  transition:all .25s var(--ease);user-select:none;
}
.chip:hover{border-color:var(--line)}
.chip.sel{background:linear-gradient(120deg,rgba(201,163,91,.22),rgba(201,163,91,.08));
  border-color:var(--oro);color:var(--bianco);box-shadow:0 6px 18px rgba(201,163,91,.18)}

/* progress ring + bars */
.opera-bar{height:9px;border-radius:20px;background:rgba(255,255,255,.06);overflow:hidden;position:relative}
.opera-bar > i{position:absolute;left:0;top:0;bottom:0;border-radius:20px;
  background:linear-gradient(90deg,var(--oro-deep),var(--oro-soft));
  box-shadow:0 0 14px rgba(201,163,91,.5);transition:width 1s var(--ease)}

/* bottom nav */
#nav{
  position:absolute;left:0;right:0;bottom:0;z-index:6;
  height:calc(76px + env(safe-area-inset-bottom,0px));
  display:flex;align-items:flex-start;justify-content:space-around;
  padding:0 8px calc(6px + env(safe-area-inset-bottom,0px));
  background:linear-gradient(180deg,rgba(11,17,32,0),rgba(8,11,20,.92) 38%);
  backdrop-filter:blur(14px);
  border-top:1px solid var(--line-soft);
}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;
  color:var(--pietra);font-size:10px;letter-spacing:.4px;flex:1;padding-top:10px;transition:color .3s}
.nav-item svg{width:23px;height:23px;stroke:var(--pietra);fill:none;stroke-width:1.5;transition:all .3s}
.nav-item.active{color:var(--oro)}
.nav-item.active svg{stroke:var(--oro);filter:drop-shadow(0 0 8px rgba(201,163,91,.45))}

/* timeline */
.tl{position:relative;padding-left:26px;margin-top:8px}
.tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:1px;
  background:linear-gradient(var(--oro),transparent)}
.tl-item{position:relative;margin-bottom:16px}
.tl-item::before{content:"";position:absolute;left:-23px;top:6px;width:10px;height:10px;border-radius:50%;
  background:var(--notte);border:2px solid var(--oro);box-shadow:0 0 10px rgba(201,163,91,.5)}

/* emotion tag colors */
.etag{font-size:11px;padding:3px 10px;border-radius:30px;font-weight:600;letter-spacing:.4px}
.e-rabbia{background:rgba(190,70,60,.18);color:#e79b92}
.e-paura{background:rgba(120,90,160,.2);color:#c2a8e0}
.e-tristezza{background:rgba(70,110,170,.2);color:#9bb8e6}
.e-vergogna{background:rgba(150,90,120,.2);color:#e0a4c2}
.e-gioia{background:rgba(201,163,91,.22);color:#e7c987}
.e-frustrazione{background:rgba(180,120,60,.2);color:#e6bd8a}
.e-ansia{background:rgba(80,140,140,.2);color:#92d0cc}

/* form */
.field{margin-bottom:18px}
.field label{display:block;font-size:12.5px;letter-spacing:.5px;color:var(--oro-soft);margin-bottom:8px;font-weight:600}
.field .hint{color:var(--pietra);font-size:12px;font-weight:400;letter-spacing:.2px}
textarea,input[type=text]{
  width:100%;background:var(--glass);border:1px solid var(--line-soft);border-radius:14px;
  padding:13px 15px;color:var(--bianco);font-family:var(--sans);font-size:14.5px;resize:none;line-height:1.5;
  transition:border-color .25s;
}
textarea:focus,input:focus{outline:none;border-color:var(--oro)}
input[type=range]{width:100%;-webkit-appearance:none;height:5px;border-radius:10px;
  background:linear-gradient(90deg,var(--oro),rgba(255,255,255,.1));margin-top:6px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#fff,var(--oro));box-shadow:0 0 0 4px rgba(201,163,91,.18),0 4px 10px rgba(0,0,0,.4);cursor:pointer}

/* stat tiles */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--glass);border:1px solid var(--line-soft);border-radius:var(--r-sm);padding:16px}
.stat .n{font-family:var(--serif);font-size:27px;color:var(--oro-soft)}
.stat .l{font-size:11px;color:var(--pietra);letter-spacing:.5px;margin-top:2px;text-transform:uppercase}

/* phases */
.phase{display:flex;gap:14px;align-items:flex-start;padding:14px;border-radius:var(--r-sm);
  border:1px solid var(--line-soft);background:var(--glass);margin-bottom:10px;position:relative}
.phase.done{border-color:var(--line)}
.phase.current{border-color:var(--oro);background:linear-gradient(140deg,rgba(201,163,91,.12),rgba(255,255,255,.02))}
.phase .glyph{width:46px;height:46px;flex-shrink:0;border-radius:12px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--line)}
.phase .glyph svg{width:26px;height:26px}
.phase h4{font-family:var(--serif);font-weight:500;font-size:17px;display:flex;align-items:center;gap:8px}
.phase small{color:var(--pietra);font-size:12.5px}
.phase .ph-state{position:absolute;right:14px;top:14px;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--oro)}

/* chart bars */
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:11px}
.bar-row .lab{width:88px;font-size:12.5px;color:var(--bianco-dim)}
.bar-track{flex:1;height:8px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden}
.bar-track > i{display:block;height:100%;border-radius:8px;background:linear-gradient(90deg,var(--oro-deep),var(--oro-soft));transition:width .9s var(--ease)}
.bar-row .val{width:26px;text-align:right;font-size:12px;color:var(--pietra)}

/* word cloud */
.cloud{display:flex;flex-wrap:wrap;gap:8px 12px;align-items:baseline}
.cloud span{color:var(--bianco-dim);line-height:1}

/* insight */
.insight{display:flex;gap:12px;padding:15px;border-radius:var(--r-sm);
  background:linear-gradient(150deg,rgba(201,163,91,.1),rgba(255,255,255,.02));
  border:1px solid var(--line);margin-bottom:10px}
.insight .ic{flex-shrink:0;color:var(--oro);margin-top:1px}

/* fab */
.fab{position:absolute;right:20px;bottom:calc(90px + env(safe-area-inset-bottom,0px));z-index:7;width:58px;height:58px;border-radius:50%;
  background:linear-gradient(135deg,var(--oro),var(--oro-deep));border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;box-shadow:0 12px 30px rgba(201,163,91,.4);
  transition:transform .3s var(--ease)}
.fab:active{transform:scale(.92) rotate(90deg)}
.fab svg{width:26px;height:26px;stroke:#1a1407;stroke-width:2;fill:none}

/* header row */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 0 18px}
.avatar{width:42px;height:42px;border-radius:14px;background:radial-gradient(circle at 30% 25%,#2a3756,#10182b);
  border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-family:var(--serif);color:var(--oro);
  cursor:pointer;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.avatar:active{transform:scale(.93)}
.avatar.tappable:hover{box-shadow:0 0 0 3px rgba(201,163,91,.18)}

.fade-seq>*{opacity:0;transform:translateY(10px);animation:rise .6s var(--ease) forwards}
@keyframes rise{to{opacity:1;transform:none}}
.fade-seq>*:nth-child(1){animation-delay:.05s}
.fade-seq>*:nth-child(2){animation-delay:.13s}
.fade-seq>*:nth-child(3){animation-delay:.21s}
.fade-seq>*:nth-child(4){animation-delay:.29s}
.fade-seq>*:nth-child(5){animation-delay:.37s}
.fade-seq>*:nth-child(6){animation-delay:.45s}
.fade-seq>*:nth-child(7){animation-delay:.53s}

.divider{height:1px;background:var(--line-soft);margin:18px 0}
.toast{position:absolute;left:50%;bottom:96px;transform:translateX(-50%) translateY(20px);z-index:20;
  background:rgba(20,24,30,.95);border:1px solid var(--line);color:var(--bianco);
  padding:12px 20px;border-radius:30px;font-size:13.5px;opacity:0;transition:all .4s var(--ease);
  backdrop-filter:blur(10px);box-shadow:var(--shadow);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.pill-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.pill{font-size:11.5px;padding:5px 11px;border-radius:20px;background:var(--glass-2);border:1px solid var(--line-soft);color:var(--bianco-dim)}
.linklike{color:var(--oro);font-size:13px;cursor:pointer;font-weight:600}

/* due-date badges */
.due{font-size:11.5px;padding:4px 10px;border-radius:20px;font-weight:600;display:inline-flex;align-items:center;gap:5px}
.due-ok{background:rgba(201,163,91,.14);color:var(--oro-soft);border:1px solid var(--line)}
.due-soon{background:rgba(180,120,60,.2);color:#e6bd8a;border:1px solid rgba(180,120,60,.4)}
.due-expired{background:rgba(190,70,60,.2);color:#e79b92;border:1px solid rgba(190,70,60,.45)}

/* checkbox giornaliera */
.habit-row{display:flex;align-items:flex-start;gap:14px;padding:14px;border-radius:var(--r-sm);
  border:1px solid var(--line-soft);background:var(--glass);margin-bottom:10px}
.habit-row.checked{border-color:var(--line);background:linear-gradient(140deg,rgba(201,163,91,.1),rgba(255,255,255,.02))}
.cbx{width:26px;height:26px;flex-shrink:0;border-radius:8px;border:1.5px solid var(--oro);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s var(--ease);background:transparent}
.cbx.on{background:linear-gradient(120deg,var(--oro),var(--oro-deep))}
.cbx svg{width:16px;height:16px;stroke:#1a1407;stroke-width:3;fill:none;opacity:0;transition:opacity .2s}
.cbx.on svg{opacity:1}

/* admin badge + delete x */
.role-badge{font-size:10px;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;
  background:linear-gradient(120deg,rgba(201,163,91,.22),rgba(201,163,91,.08));border:1px solid var(--oro);color:var(--oro-soft);font-weight:700}
.del-x{color:var(--pietra);cursor:pointer;font-size:18px;line-height:1;padding:2px 6px;border-radius:8px}
.del-x:hover{color:#e79b92;background:rgba(190,70,60,.12)}
.seg{display:flex;gap:8px;margin-bottom:14px}
.seg .chip{flex:1;text-align:center}
input[type=date],select{
  width:100%;background:var(--glass);border:1px solid var(--line-soft);border-radius:14px;
  padding:13px 15px;color:var(--bianco);font-family:var(--sans);font-size:14.5px;
}
input[type=date]:focus,select:focus{outline:none;border-color:var(--oro)}
</style>
</head>

    <g stroke="#c9a35b" fill="none" stroke-width=".6">
      <circle cx="100" cy="100" r="92"/>
      <circle cx="100" cy="100" r="70"/>
      <circle cx="100" cy="100" r="48"/>
      <polygon points="100,20 169,140 31,140"/>

    </g>
  </svg>

  <div class="statusbar">

  </div>

  <div id="viewport"></div>

  <div class="toast" id="toast"></div>
  <nav id="nav"></nav>
</div>

<script>
/* =========================================================================
   ATHANOR — Architettura applicativa (web app funzionante)
   - state: stato globale (sincronizzato con Supabase; fallback in memoria)
   - screens: render funzionale per ogni schermata
   - router: gestione navigazione + transizioni
   ========================================================================= */

/* =========================================================================
   CONFIGURAZIONE SUPABASE
   Inserisci qui l'URL e la chiave ANON pubblica del tuo progetto Supabase.
   (Project Settings > API). La chiave anon e sicura lato client.
   NON inserire mai la service_role key.
   Se lasci i placeholder, l'app funziona in modalita LOCALE (dati in memoria).
   ========================================================================= */
const SUPABASE_URL      = "https://gnzvstaetlwlvvksfodg.supabase.co";       // es. https://xxxx.supabase.co
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImduenZzdGFldGx3bHZ2a3Nmb2RnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIwNzk3OTQsImV4cCI6MjA5NzY1NTc5NH0.JGqI8RIYQV-C3dSAvn4vWJ8jLRZwJ9n_CL54P9lwUf4";  // es. eyJhbGciOi...

let sb = null;
const cloudEnabled = SUPABASE_URL.startsWith("http") && SUPABASE_ANON_KEY.length > 20;
if (cloudEnabled && window.supabase) {
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
}

/* mappa fasi DB <-> indice numerico usato dalla UI */
const PHASE_KEYS = ["nigredo","albedo","rubedo"];
const phaseToIdx = k => Math.max(0, PHASE_KEYS.indexOf(k));
const idxToPhase = i => PHASE_KEYS[i] || "nigredo";

const EMOTIONS = ["rabbia","paura","tristezza","vergogna","gioia","frustrazione","ansia"];
const BLOCKS = ["procrastinazione","paura del giudizio","ansia","autostima","rabbia","bisogno di approvazione","relazioni difficili"];

const QUOTES = [
  ["Cio che resiste, persiste; cio che accogli, si trasforma.","Carl Jung (parafrasi)"],
  ["La via d'uscita e attraverso.","Robert Frost"],
  ["Conosci te stesso.","Oracolo di Delfi"],
  ["L'oro non si trova: si raffina nel fuoco.","Athanor"],
];

/* ---- in-memory store (sostituibile con Firestore) ---- */
const state = {
  onboarded:false,
  user:{name:"Viandante", initial:"A"},
  role:"viandante",     // 'admin' | 'viandante'
  blocks:[],            // {id,name,phase 0-2}
  mainBlock:null,
  mainBlockId:null,
  uid:null,
  goal:"",
  dailyTime:"15",
  entries:[],
  streak:7,
  exercisesDone:12,
  minutes:340,
  opera:0,

function relTime(iso){
  const d=(Date.now()-new Date(iso).getTime())/86400000;
  if(d<1)return"oggi"; if(d<2)return"ieri"; return Math.floor(d)+" giorni fa";
}
const MESI=["gen","feb","mar","apr","mag","giu","lug","ago","set","ott","nov","dic"];
function fmtDate(iso){ if(!iso) return"-"; const d=new Date(iso); return d.getDate()+" "+MESI[d.getMonth()]; }
function fmtDateTime(iso){ if(!iso) return"-"; const d=new Date(iso);
  return d.getDate()+" "+MESI[d.getMonth()]+" - "+String(d.getHours()).padStart(2,'0')+":"+String(d.getMinutes()).padStart(2,'0'); }
function daysLeft(dateStr){ if(!dateStr) return null;
  const due=new Date(dateStr+"T23:59:59"); const now=new Date();
  return Math.ceil((due-now)/86400000); }
function dueLabel(dateStr){
  const n=daysLeft(dateStr);
  if(n===null) return {txt:"Senza scadenza",cls:""};
  if(n<0)  return {txt:"Scaduto - da cambiare",cls:"due-expired"};
  if(n===0)return {txt:"Scade oggi",cls:"due-soon"};
  if(n<=2) return {txt:"Scade tra "+n+(n===1?" giorno":" giorni"),cls:"due-soon"};
  return {txt:"Scade il "+fmtDate(dateStr),cls:"due-ok"};
}

function computeOpera(){
  const phaseAvg = state.blocks.length? state.blocks.reduce((a,b)=>a+b.phase,0)/(state.blocks.length*MAXPHASE):0;
  const journal = Math.min(state.entries.length/8,1);
  state.opera = Math.round((phaseAvg*0.65 + journal*0.35)*100);
}

function scSchemi(){

    </div>

    <div class="card">
      <h2 class="section">Emozioni piu frequenti</h2>
      ${sorted.map(([e,n])=>`
        <div class="bar-row"><span class="lab" style="text-transform:capitalize">${e}</span>

    </div>

    <div class="card">
      <h2 class="section">Intensita emotiva nel tempo</h2>
      <svg viewBox="0 0 280 90" width="100%" height="90" style="overflow:visible">
        <defs><linearGradient id="ig" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#c9a35b" stop-opacity=".4"/><stop offset="1" stop-color="#c9a35b" stop-opacity="0"/></linearGradient></defs>
        ${sparkline(ints,280,90)}
      </svg>
      <p class="muted" style="margin-top:6px">Le punte indicano i momenti piu carichi: li abita il materiale dell'Opera.</p>
    </div>

    <div class="card">

      <div class="cloud">
        ${words.map(([w,n])=>`<span style="font-size:${13+(n/maxW)*16}px;color:${n===maxW?'var(--oro-soft)':'var(--bianco-dim)'};font-family:var(--serif)">${esc(w)}</span>`).join('')||'<span class="muted">-</span>'}
      </div>
    </div>

    <div class="insight">
      <div class="ic">${I.spark}</div>
      <div><b>Progresso.</b> L'intensita media delle tue emozioni e ${ints.length?(ints.reduce((a,b)=>a+b,0)/ints.length).toFixed(1):'-'}/10. Ogni voce che scrivi rende lo schema piu visibile - e cio che e visibile puo essere trasformato.</div>
    </div>
  </div>`;
  return r;
}
function sparkline(vals,W,H){
  if(vals.length<2){return `<text x="10" y="50" fill="#7c8088" font-size="11">Servono piu voci</text>`;}
  const max=10,min=0,pad=8;
  const stepX=(W-pad*2)/(vals.length-1);
  const pts=vals.map((v,i)=>[pad+i*stepX, H-pad-(v-min)/(max-min)*(H-pad*2)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+` L ${pts[pts.length-1][0].toFixed(1)} ${H-pad} L ${pts[0][0].toFixed(1)} ${H-pad} Z`;
  return `<path d="${area}" fill="url(#ig)"/><path d="${line}" fill="none" stroke="#d9bd84" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    ${pts.map(p=>`<circle cx="${p[0].toFixed(1)}" cy="${p[1].toFixed(1)}" r="3" fill="#10182b" stroke="#d9bd84" stroke-width="1.5"/>`).join('')}`;
}

function scOpera(){

    ${state.blocks.map(blockCard).join('')}
  </div>`;
  r.querySelectorAll('[data-adv]').forEach(btn=>btn.onclick=()=>{

      DB.advanceBlock(b.id,b.phase);

  });
  return r;
}
function blockDesc(n){const d={

function phaseDesc(k){return {

  const def=new Date();def.setDate(def.getDate()+7);
  ov.innerHTML=`
  <div style="padding:18px 22px 40px;height:100%;overflow-y:auto" class="fade-seq">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px">
      <h2 class="section" style="margin:0">Nuovo esercizio</h2>
      <span class="linklike" id="ef-close">Chiudi</span>
    </div>
    <div class="field"><label>Titolo</label><input type="text" id="ef-title" placeholder="Es. Scrittura riflessiva"></div>
    <div class="field"><label>Destinatario</label>
      <select id="ef-to">
        <option value="">Tutti i viandanti</option>
        ${state.viandanti.map(v=>`<option value="${esc(v.id)}">${esc(v.name)}</option>`).join('')}
      </select></div>
    <div class="field"><label>Consegna <span class="hint">- cosa deve fare il viandante</span></label><textarea id="ef-desc" rows="3" placeholder="Descrivi l'esercizio"></textarea></div>
    <div class="field"><label>Livello</label>
      <select id="ef-level"><option>Livello 1</option><option>Livello 2</option><option>Livello 3</option></select></div>
    <div class="field"><label>Minuti stimati</label><input type="text" id="ef-min" value="10"></div>
    <div class="field"><label>Scadenza <span class="hint">- dopo va cambiato</span></label>
      <input type="date" id="ef-due" value="${def.toISOString().slice(0,10)}"></div>
    <button class="btn" id="ef-save">Assegna esercizio</button>
  </div>`;
  vp().appendChild(ov);
  ov.querySelector('#ef-close').onclick=()=>ov.remove();
  ov.querySelector('#ef-save').onclick=async()=>{
    const title=ov.querySelector('#ef-title').value.trim();
    if(!title){toast("Inserisci un titolo");return;}
    const a={user_id:ov.querySelector('#ef-to').value||null, title, description:ov.querySelector('#ef-desc').value.trim(),
      level:ov.querySelector('#ef-level').value, minutes:+ov.querySelector('#ef-min').value||10,
      due_date:ov.querySelector('#ef-due').value, completed:false};
    let saved=null;
    if(sb&&state.uid){ try{ saved=await DB.addAssigned(a);}catch(e){toast("Errore salvataggio");} }
    state.assigned.push({id:saved?saved.id:"a"+Date.now(),...a});
    ov.remove(); go('admin'); toast("Esercizio assegnato");
  };
}

/* ----------------------------- ESERCIZI (viandante) ----------------------------- */
function scEsercizi(){
  const r=document.createElement('div');r.className="screen";

  function assignedCard(a){
    const d=dueLabel(a.due_date);
    const expired=daysLeft(a.due_date)!==null && daysLeft(a.due_date)<0;
    return `<div class="card" style="margin-bottom:12px;${expired?'border-color:rgba(190,70,60,.4)':''}">
      <div style="display:flex;gap:12px;align-items:flex-start">
        <div style="color:var(--oro);margin-top:2px">${I.flask}</div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:15.5px">${esc(a.title)}</div>
          ${a.description?`<p class="muted" style="margin-top:4px">${esc(a.description)}</p>`:''}
          <div class="pill-row" style="margin-top:10px">
            <span class="pill">${esc(a.level||'Livello 1')}</span>
            <span class="pill">${a.minutes||10} min</span>
            <span class="due ${d.cls}">${d.txt}</span>
          </div>
          ${expired?`<p class="muted" style="margin-top:8px;color:#e79b92">Questo esercizio e scaduto: chiedi al tuo riferimento un nuovo esercizio.</p>`:''}
        </div>
      </div>
    </div>`;
  }

  function habitRow(h){
    return `<div class="habit-row ${h.doneToday?'checked':''}">
      <div class="cbx ${h.doneToday?'on':''}" data-hab="${h.id}">${I.check}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:15px">${esc(h.title)}</div>
        ${h.note?`<p class="muted" style="margin-top:2px">${esc(h.note)}</p>`:''}
      </div>
      <span class="del-x" data-delh="${h.id}">&times;</span>
    </div>`;
  }

  const active=state.assigned.filter(a=>{const n=daysLeft(a.due_date);return n===null||n>=0;});
  const expired=state.assigned.filter(a=>{const n=daysLeft(a.due_date);return n!==null&&n<0;});
  const doneCount=state.habits.filter(h=>h.doneToday).length;

  r.innerHTML=`
  <div class="hdr"><div><div class="eyebrow">Il tuo lavoro</div><h2 class="section" style="margin:4px 0 0">Esercizi</h2></div></div>
  <div class="fade-seq">

    <h2 class="section" style="font-size:18px">Assegnati a te</h2>
    ${active.map(assignedCard).join('')||'<p class="muted" style="margin-bottom:8px">Nessun esercizio attivo al momento.</p>'}
    ${expired.length?`<p class="muted" style="margin:14px 0 8px;color:#e79b92">Scaduti - da sostituire</p>${expired.map(assignedCard).join('')}`:''}

    <div class="divider"></div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <h2 class="section" style="font-size:18px;margin:0">Pratiche quotidiane</h2>
      <span class="muted" style="font-size:12px">${doneCount}/${state.habits.length} oggi</span>
    </div>
    <p class="muted" style="margin-bottom:14px">Esercizi che imposti tu. Spunta ogni giorno cosa hai svolto.</p>
    ${state.habits.map(habitRow).join('')||'<p class="muted">Crea la tua prima pratica quotidiana.</p>'}
    <button class="btn ghost" id="ex-new-habit" style="margin-top:8px">+ Nuova pratica quotidiana</button>
  </div>`;

  r.querySelectorAll('[data-hab]').forEach(c=>c.onclick=async()=>{
    const h=state.habits.find(x=>x.id==c.dataset.hab);
    h.doneToday=!h.doneToday;
    go('esercizi');
    toast(h.doneToday?"Pratica confermata per oggi":"Conferma rimossa");
    if(sb&&state.uid){ try{ await DB.toggleHabit(state.uid,h.id,h.doneToday);}catch(e){} }
  });
  r.querySelectorAll('[data-delh]').forEach(b=>b.onclick=async()=>{
    state.habits=state.habits.filter(h=>h.id!=b.dataset.delh);
    await DB.deleteHabit(b.dataset.delh); go('esercizi'); toast("Pratica rimossa");
  });
  r.querySelector('#ex-new-habit').onclick=openHabitForm;
  return r;
}

function openHabitForm(){
  const ov=document.createElement('div');
  ov.className="screen active no-pad";
  ov.style.cssText="background:linear-gradient(180deg,var(--antracite),var(--notte-2));z-index:30;padding:0";
  ov.innerHTML=`
  <div style="padding:18px 22px 40px;height:100%;overflow-y:auto" class="fade-seq">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <h2 class="section" style="margin:0">Nuova pratica</h2>
      <span class="linklike" id="hf-close">Chiudi</span>
    </div>
    <p class="muted" style="margin-bottom:20px">Un esercizio che ripeti ogni giorno e confermi con un tocco.</p>
    <div class="field"><label>Titolo</label><input type="text" id="hf-title" placeholder="Es. 5 minuti di respiro consapevole"></div>
    <div class="field"><label>Nota <span class="hint">- quando o come</span></label><textarea id="hf-note" rows="2" placeholder="Es. Al mattino, appena sveglio"></textarea></div>
    <button class="btn" id="hf-save">Crea pratica</button>
  </div>`;
  vp().appendChild(ov);
  ov.querySelector('#hf-close').onclick=()=>ov.remove();
  ov.querySelector('#hf-save').onclick=async()=>{
    const title=ov.querySelector('#hf-title').value.trim();
    if(!title){toast("Inserisci un titolo");return;}
    const h={title, note:ov.querySelector('#hf-note').value.trim(), doneToday:false};
    let saved=null;
    if(sb&&state.uid){ try{ saved=await DB.addHabit(state.uid,h);}catch(e){toast("Errore salvataggio");} }
    state.habits.push({id:saved?saved.id:"h"+Date.now(),...h});
    ov.remove(); go('esercizi'); toast("Pratica creata");
  };
}

/* ============================ ROUTER ============================ */
const SCREENS={home:scHome,diario:scDiario,schemi:scSchemi,opera:scOpera,profilo:scProfilo,admin:scAdmin,esercizi:scEsercizi};

let fab=null;
function go(name){
  const v=vp();
  [...v.children].forEach(c=>c.remove());
  const el=SCREENS[name]();
  v.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.s===name));
  if(fab)fab.remove();
  if(name==='diario'){
    fab=document.createElement('button');fab.className='fab';fab.innerHTML=I.plus;
    fab.onclick=openEntryForm;document.getElementById('device').appendChild(fab);
  }
  v.scrollTop=0;
}
function buildNav(){
  const nav=document.getElementById('nav');
  const items=[
    ["home","Home",I.home],
    ["esercizi","Esercizi",I.flask],
    ["diario","Diario",I.book],
    ["opera","Opera",I.chart],
    ["profilo","Tu",I.user],
  ];
  if(state.role==='admin') items.push(["admin","Admin",I.shield]);
  nav.innerHTML=items.map(([s,l,ic])=>`<div class="nav-item" data-s="${s}">${ic}<span>${l}</span></div>`).join('');
  nav.querySelectorAll('.nav-item').forEach(n=>n.onclick=()=>go(n.dataset.s));
  nav.style.display='flex';
}
function restart(){
  state.onboarded=false;state.blocks=[];state.entries=[];state.opera=0;
  document.getElementById('nav').style.display='none';
  if(fab){fab.remove();fab=null;}
  [...vp().children].forEach(c=>c.remove());
  vp().appendChild(scOnboard());
}

/* ============================ LOGIN ============================ */
function scLogin(){
  const r=document.createElement('div');r.className="screen no-pad active";
  r.innerHTML=`
  <div style="height:100%;display:flex;flex-direction:column;justify-content:center;padding:44px 32px;text-align:center" class="fade-seq">
    <div style="margin:0 auto 24px;width:96px;height:96px;display:flex;align-items:center;justify-content:center">
      <svg viewBox="0 0 100 100" width="96" height="96" style="animation:spin 30s linear infinite">
        <g stroke="#c9a35b" fill="none" stroke-width="1">
          <circle cx="50" cy="50" r="44"/><polygon points="50,12 84,72 16,72"/>
          <circle cx="50" cy="50" r="16" fill="rgba(201,163,91,.15)"/></g>
      </svg>
    </div>
    <div class="eyebrow">Laboratorio interiore</div>
    <h1 class="title" style="font-size:38px;margin-top:10px">Athanor</h1>
    <p class="lede" style="margin:14px 8px 30px">Accedi per custodire la tua Opera Alchemica nel cloud, sincronizzata su ogni dispositivo.</p>
    <button class="btn" id="lg-google" style="margin-bottom:12px">Continua con Google</button>
    <button class="btn ghost" id="lg-apple" style="margin-bottom:20px">Continua con Apple</button>
    <span class="linklike" id="lg-demo">Entra in modalita demo (senza account)</span>
    ${!cloudEnabled?'<p class="muted" style="margin-top:20px;font-size:12px">Supabase non configurato: il login usera la modalita demo finche non inserisci URL e chiave anon.</p>':''}
  </div>`;
  r.querySelector('#lg-google').onclick=()=>DB.signInWith('google');
  r.querySelector('#lg-apple').onclick=()=>DB.signInWith('apple');
  r.querySelector('#lg-demo').onclick=()=>{ state.uid=null; startOnboarding(); };
  return r;
}
function startOnboarding(){
  document.getElementById('nav').style.display='none';
  [...vp().children].forEach(c=>c.remove());
  vp().appendChild(scOnboard());
}

/* ============================ BOOT ============================ */
async function boot(){
  document.getElementById('nav').style.display='none';
  const user = await DB.currentUser();           // null se non loggato o modalita demo
  if(user){
    // sessione cloud attiva: carica profilo e dati
    state.uid=user.id;
    const prof=await DB.loadProfile(user.id);
    if(prof){
      state.user.name=prof.display_name||"Viandante";
      state.user.initial=(prof.display_name||"A").trim().charAt(0).toUpperCase();
      state.goal=prof.goal||state.goal;
      state.dailyTime=prof.daily_time||state.dailyTime;
      state.role=prof.role||"viandante";
      state.streak=prof.streak; state.exercisesDone=prof.exercises_done; state.minutes=prof.minutes;
    }
    state.blocks=await DB.loadBlocks(user.id);
    state.entries=await DB.loadEntries(user.id);
    try{
      state.meetings=await DB.loadMeetings();
      state.assigned=state.role==='admin'?await DB.loadAllAssigned():await DB.loadAssigned(user.id);
      state.habits=await DB.loadHabits(user.id);
      if(state.role==='admin') state.viandanti=await DB.loadViandanti();
    }catch(e){ /* tabelle v2 non ancora create: resta su demo */ }
    if(prof && prof.onboarded && state.blocks.length){
      state.mainBlock=state.blocks[0].name;
      state.mainBlockId=state.blocks[0].id;
      state.onboarded=true;
      computeOpera(); buildNav(); go('home');
    }else{
      startOnboarding();           // utente nuovo: deve fare l'onboarding
    }
  }else{
    // nessuna sessione: mostra login (o demo)
    [...vp().children].forEach(c=>c.remove());
    vp().appendChild(scLogin());
  }
}

function restartFull(){ if(sb) DB.signOut(); else { state.uid=null; vp().innerHTML=''; vp().appendChild(scLogin()); } }
window.restart=restartFull;
window.go=go;
/* avvio applicazione */
boot();
</script>
